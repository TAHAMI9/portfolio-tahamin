version: "3.8"

services:
  # The load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - portfolio-network

  # The API backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Expose the internal port to the docker network, but NOT directly to the host
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
      # Let the node cluster module know how many workers to fork INSIDE the container
      - CLUSTER_WORKERS=2 
    deploy:
      mode: replicated
      replicas: 3
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
