# ─────────────────────────────────────────────────────────────────────────────
# CI/CD PIPELINE — GitHub Actions
# Runs on every push to main:
#   1. Lint both frontend and backend
#   2. Build both
#   3. Deploy frontend to Vercel automatically
#
# To use this:
#   1. Push your code to GitHub
#   2. Connect your GitHub repo to Vercel (vercel.com → Import project)
#   3. Add these secrets to GitHub (Settings → Secrets → Actions):
#      - VERCEL_TOKEN       (from vercel.com/account/tokens)
#      - VERCEL_ORG_ID      (from .vercel/project.json after first deploy)
#      - VERCEL_PROJECT_ID  (from .vercel/project.json after first deploy)
# ─────────────────────────────────────────────────────────────────────────────

name: CI / CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Build Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # These values are safe placeholders for the build step
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_SITE_URL: https://tahaminislam.com

  # ── Job 2: Lint & Build Backend ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Job 3: Deploy to Vercel (frontend only, on main branch) ──────────────────
  deploy:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [frontend, backend]   # Only deploy if both build jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"
